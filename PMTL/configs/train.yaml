dataset: mnist          # mnist | fashion | fashion_and_mnist

model: lenet            # lenet | resnet18

niter: 100              # số epoch huấn luyện (lenet: ~100, resnet18: ~20)

npref: 5                # số preference vector — mỗi vector cho 1 điểm Pareto

data_dir: data          # thư mục chứa file .pickle của dataset

save_dir: saved_model   # thư mục lưu model sau khi train
